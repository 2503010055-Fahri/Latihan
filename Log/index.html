<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>

    <div class="container">
        <div class="row py-4">
            <h2 class="text-center mt-5">Login</h2>
            <div class="input-user" class="form-control">
                <input type="text" id="username" placeholder="Username" class="form-control my-3">
            </div>
            <div class="input-pass" class="form-control">
                <input type="password" id="password" placeholder="Password" class="form-control my-3">
            </div>
            <button type="button" class="btn btn-primary col-1" id="Button">Simpan</button>
        </div>
        <div class="row">
            <h2 class="text-center mt-3">Data Login</h2>
            <span id="hasil"></span>
        </div>
    </div>

    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
